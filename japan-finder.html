<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Japan 2026 Trip Finder</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c0392b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Japan 2026"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1008;--crimson:#c0392b;--gold:#c9972c;--cream:#faf7f2;--paper:#f0ebe1;--muted:#7a6e61;--border:#d9d0c3;--card:#ffffff}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.hero{padding:3.5rem 1.5rem 2rem;text-align:center}
.kamon{display:flex;justify-content:center;margin-bottom:1rem}
.kamon svg{opacity:0.18}
.tagline{font-family:'Shippori Mincho',serif;font-size:11px;letter-spacing:0.35em;text-transform:uppercase;color:var(--crimson);margin-bottom:0.5rem}
.hero-title{font-family:'Noto Serif JP',serif;font-size:clamp(22px,5vw,36px);font-weight:300;color:var(--ink);line-height:1.35;margin-bottom:0.3rem}
.hero-title em{font-style:normal;font-weight:700;color:var(--crimson)}
.year-badge{display:inline-block;font-size:11px;letter-spacing:0.2em;color:var(--muted);background:var(--paper);border:0.5px solid var(--border);border-radius:20px;padding:3px 14px;margin-bottom:1.75rem}
.search-wrap{position:relative;max-width:580px;margin:0 auto 1.25rem}
.search-input{width:100%;padding:14px 52px 14px 18px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--ink);background:var(--card);border:1.5px solid var(--border);border-radius:14px;outline:none;-webkit-appearance:none;transition:border-color 0.2s,box-shadow 0.2s}
.search-input::placeholder{color:#b0a89b}
.search-input:focus{border-color:var(--crimson);box-shadow:0 0 0 3px rgba(192,57,43,0.08)}
.search-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:34px;height:34px;background:var(--crimson);border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.search-btn:active{opacity:0.8}
.pills{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:620px;margin:0 auto}
.pill{display:flex;align-items:center;gap:6px;padding:9px 15px;background:var(--card);border:1px solid var(--border);border-radius:100px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.pill:active,.pill.active{background:var(--crimson);border-color:var(--crimson);color:#fff}
.pill i{font-size:14px}
.divider{width:40px;height:1px;background:var(--border);margin:1.75rem auto 0}

/* Results section */
.results-section{padding:0 1.25rem 4rem;max-width:740px;margin:0 auto}
.results-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 0 1rem}
.results-label{font-family:'Shippori Mincho',serif;font-size:13px;letter-spacing:0.15em;color:var(--muted);max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.results-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.result-count{font-size:12px;color:var(--muted);background:var(--paper);border:0.5px solid var(--border);padding:3px 10px;border-radius:20px}

/* View toggle */
.view-toggle{display:flex;background:var(--paper);border:0.5px solid var(--border);border-radius:20px;padding:3px;gap:2px}
.view-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border:none;background:transparent;border-radius:16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.view-btn.active{background:var(--crimson);color:#fff}
.view-btn i{font-size:13px}

/* List view */
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--crimson);border-radius:50%;animation:spin 0.8s linear infinite;margin:3rem auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{text-align:center;font-family:'Shippori Mincho',serif;font-size:13px;letter-spacing:0.15em;color:var(--muted);margin-bottom:3rem}
.result-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:1rem 1.1rem;margin-bottom:10px;display:flex;gap:0.85rem;animation:cardIn 0.3s ease both;-webkit-tap-highlight-color:transparent;cursor:pointer}
.result-card:active,.result-card.highlighted{border-color:var(--crimson)}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-icon{width:42px;height:42px;background:var(--paper);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-icon i{font-size:20px;color:var(--crimson)}
.card-body{flex:1;min-width:0}
.card-name{font-weight:500;font-size:14px;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-address{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.stars{color:var(--gold);font-size:11px;font-weight:500}
.stars span{color:var(--muted);font-weight:400}
.tag{font-size:10px;background:var(--paper);border:0.5px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:20px}
.tag.open{background:#edf7ed;border-color:#b7dfb7;color:#2e7d32}
.tag.closed{background:#fdecea;border-color:#f5b8b4;color:#c0392b}
.map-link{margin-left:auto;font-size:11px;color:var(--crimson);text-decoration:none;display:flex;align-items:center;gap:3px;flex-shrink:0;align-self:flex-start;padding-top:2px}

/* Map view */
#mapContainer{display:none;border-radius:14px;overflow:hidden;border:0.5px solid var(--border);margin-bottom:1rem}
#map{width:100%;height:420px}
.map-info-panel{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:1rem 1.1rem;margin-bottom:10px;display:none}
.map-info-panel.visible{display:block;animation:cardIn 0.2s ease}
.map-info-name{font-weight:500;font-size:15px;margin-bottom:3px}
.map-info-address{font-size:12px;color:var(--muted);margin-bottom:6px}
.map-info-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.map-info-actions{display:flex;gap:8px;margin-top:10px}
.map-action-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;border:0.5px solid var(--border);background:var(--paper);color:var(--ink)}
.map-action-btn.primary{background:var(--crimson);border-color:var(--crimson);color:#fff}

.error-box{background:#fdecea;border:0.5px solid #f5b8b4;border-radius:10px;padding:1rem 1.25rem;font-size:13px;color:#922b21;line-height:1.8}
.offline-banner{display:none;background:#fff3cd;border-bottom:1px solid #ffc107;padding:8px 16px;text-align:center;font-size:12px;color:#856404}
</style>
</head>
<body>

<div class="offline-banner" id="offlineBanner">
  <i class="ti ti-wifi-off"></i> You're offline — showing cached results only
</div>

<div class="hero">
  <div class="kamon">
    <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
      <circle cx="26" cy="26" r="24" stroke="#c0392b" stroke-width="1.5"/>
      <circle cx="26" cy="26" r="16" stroke="#c0392b" stroke-width="1"/>
      <circle cx="26" cy="26" r="3" fill="#c0392b"/>
      <line x1="26" y1="2" x2="26" y2="10" stroke="#c0392b" stroke-width="1.5"/>
      <line x1="26" y1="42" x2="26" y2="50" stroke="#c0392b" stroke-width="1.5"/>
      <line x1="2" y1="26" x2="10" y2="26" stroke="#c0392b" stroke-width="1.5"/>
      <line x1="42" y1="26" x2="50" y2="26" stroke="#c0392b" stroke-width="1.5"/>
      <line x1="7.76" y1="7.76" x2="13.6" y2="13.6" stroke="#c0392b" stroke-width="1"/>
      <line x1="38.4" y1="38.4" x2="44.24" y2="44.24" stroke="#c0392b" stroke-width="1"/>
      <line x1="44.24" y1="7.76" x2="38.4" y2="13.6" stroke="#c0392b" stroke-width="1"/>
      <line x1="13.6" y1="38.4" x2="7.76" y2="44.24" stroke="#c0392b" stroke-width="1"/>
    </svg>
  </div>
  <div class="tagline">Japan 2026 · 日本の旅</div>
  <h1 class="hero-title">What can I help you<br>find in <em>Japan</em> today?</h1>
  <div class="year-badge">Your 2026 guide</div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="e.g. ramen in Shibuya, jazz bars in Osaka…" autocomplete="off"/>
    <button class="search-btn" id="searchBtn" aria-label="Search">
      <i class="ti ti-search" style="color:#fff;font-size:15px"></i>
    </button>
  </div>
  <div class="pills">
    <button class="pill" data-query="best restaurants in Tokyo Japan"><i class="ti ti-tools-kitchen-2"></i> Restaurants</button>
    <button class="pill" data-query="top tourist locations attractions Japan"><i class="ti ti-map-pin"></i> Interesting Places</button>
    <button class="pill" data-query="live music venues jazz bars Tokyo Japan"><i class="ti ti-music"></i> Music Venues</button>
    <button class="pill" data-query="sports venues stadiums arenas Tokyo Japan"><i class="ti ti-ball-baseball"></i> Sports</button>
    <button class="pill" data-query="go-kart karting tracks indoor racing Tokyo Japan"><i class="ti ti-steering-wheel"></i> Karting</button>
  </div>
</div>

<div class="results-section" id="resultsSection" style="display:none">
  <div class="divider"></div>
  <div class="results-header">
    <span class="results-label" id="resultsLabel"></span>
    <div class="results-right">
      <span class="result-count" id="resultCount"></span>
      <div class="view-toggle">
        <button class="view-btn active" id="listViewBtn" onclick="switchView('list')">
          <i class="ti ti-list"></i> List
        </button>
        <button class="view-btn" id="mapViewBtn" onclick="switchView('map')">
          <i class="ti ti-map"></i> Map
        </button>
      </div>
    </div>
  </div>

  <!-- List view -->
  <div id="listView">
    <div id="resultsContainer"></div>
  </div>

  <!-- Map view -->
  <div id="mapView" style="display:none">
    <div id="mapContainer"><div id="map"></div></div>
    <div class="map-info-panel" id="mapInfoPanel"></div>
  </div>
</div>

<script>
const BACKEND_URL = 'https://japan-backend-ry5q.onrender.com/search';
const MAPS_KEY = 'AIzaSyBeTfb3Wdt53Id2fGf2Aas1UUqgyj0zZ5A';

let currentPlaces = [];
let map = null;
let markers = [];
let mapLoaded = false;
let currentView = 'list';

// Offline detection
window.addEventListener('online',  () => document.getElementById('offlineBanner').style.display='none');
window.addEventListener('offline', () => document.getElementById('offlineBanner').style.display='block');
if (!navigator.onLine) document.getElementById('offlineBanner').style.display='block';

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

const ICONS = {
  restaurant:'ti-tools-kitchen-2',food:'ti-tools-kitchen-2',ramen:'ti-bowl',
  bar:'ti-glass',cafe:'ti-coffee',music:'ti-music',karaoke:'ti-microphone',
  stadium:'ti-ball-baseball',sport:'ti-ball-baseball',arena:'ti-trophy',
  karting:'ti-steering-wheel',kart:'ti-steering-wheel',racing:'ti-steering-wheel',
  temple:'ti-building',shrine:'ti-building',museum:'ti-building-castle',
  park:'ti-trees',default:'ti-map-pin'
};

function getIcon(types){
  if(!types||!types.length) return ICONS.default;
  for(const t of types){const k=t.toLowerCase();for(const key in ICONS){if(k.includes(key))return ICONS[key];}}
  return ICONS.default;
}
function stars(r){if(!r)return '';let s='';for(let i=0;i<Math.floor(r);i++)s+='★';if(r-Math.floor(r)>=0.5)s+='½';return s;}
function fmtTypes(t){if(!t||!t.length)return '';return t.slice(0,2).map(x=>x.replace(/_/g,' ')).join(' · ');}

// View toggle
function switchView(view){
  currentView = view;
  document.getElementById('listViewBtn').classList.toggle('active', view==='list');
  document.getElementById('mapViewBtn').classList.toggle('active', view==='map');
  document.getElementById('listView').style.display = view==='list' ? 'block' : 'none';
  document.getElementById('mapView').style.display  = view==='map'  ? 'block' : 'none';

  if(view==='map'){
    document.getElementById('mapContainer').style.display='block';
    if(!mapLoaded) loadGoogleMaps();
    else renderMap();
  }
}

// Load Google Maps JS API dynamically
function loadGoogleMaps(){
  if(mapLoaded) return;
  const script = document.createElement('script');
  script.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_KEY}&callback=initMap`;
  script.async = true;
  document.head.appendChild(script);
}

window.initMap = function(){
  mapLoaded = true;
  map = new google.maps.Map(document.getElementById('map'), {
    center: {lat: 35.6762, lng: 139.6503},
    zoom: 11,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    styles: [
      {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'transit',elementType:'labels.icon',stylers:[{visibility:'off'}]}
    ]
  });
  renderMap();
};

function renderMap(){
  if(!map || !currentPlaces.length) return;

  // Clear existing markers
  markers.forEach(m => m.setMap(null));
  markers = [];

  const bounds = new google.maps.LatLngBounds();

  currentPlaces.forEach((place, i) => {
    const lat = place.geometry?.location?.lat;
    const lng = place.geometry?.location?.lng;
    if(!lat || !lng) return;

    const marker = new google.maps.Marker({
      position: {lat, lng},
      map,
      title: place.name,
      label: {
        text: String(i+1),
        color: '#ffffff',
        fontSize: '12px',
        fontWeight: '500'
      },
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        fillColor: '#c0392b',
        fillOpacity: 1,
        strokeColor: '#ffffff',
        strokeWeight: 2,
        scale: 16
      }
    });

    marker.addListener('click', () => showMapInfo(place, i));
    markers.push(marker);
    bounds.extend({lat, lng});
  });

  if(markers.length > 0) map.fitBounds(bounds);
}

function showMapInfo(place, index){
  const panel = document.getElementById('mapInfoPanel');
  const rating = place.rating ? `<span class="stars">${stars(place.rating)} <span>${place.rating}</span></span>` : '';
  const typeTag = fmtTypes(place.types) ? `<span class="tag">${fmtTypes(place.types)}</span>` : '';
  const openTag = place.opening_hours?.open_now != null
    ? `<span class="tag ${place.opening_hours.open_now?'open':'closed'}">${place.opening_hours.open_now?'Open now':'Closed'}</span>` : '';
  const mapsUrl = place.place_id
    ? `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(place.name+' '+place.formatted_address)}` : '#';

  panel.innerHTML = `
    <div class="map-info-name">${index+1}. ${place.name}</div>
    <div class="map-info-address">${place.formatted_address||''}</div>
    <div class="map-info-meta">${rating}${typeTag}${openTag}</div>
    <div class="map-info-actions">
      <a class="map-action-btn primary" href="${mapsUrl}" target="_blank">
        <i class="ti ti-directions"></i> Directions
      </a>
      <button class="map-action-btn" onclick="document.getElementById('mapInfoPanel').classList.remove('visible')">
        <i class="ti ti-x"></i> Close
      </button>
    </div>`;
  panel.classList.add('visible');

  // Pan map to marker
  const lat = place.geometry?.location?.lat;
  const lng = place.geometry?.location?.lng;
  if(lat && lng) map.panTo({lat, lng});
}

// Render list cards
function renderList(places){
  const container = document.getElementById('resultsContainer');
  container.innerHTML = '';
  if(!places.length){
    container.innerHTML='<p style="text-align:center;color:#7a6e61;padding:2rem;font-family:Shippori Mincho,serif;letter-spacing:0.1em">No results found — try a different search</p>';
    return;
  }
  places.forEach((p,i)=>{
    const card=document.createElement('div');
    card.className='result-card';
    card.style.animationDelay=`${i*45}ms`;
    const rating=p.rating?`<span class="stars">${stars(p.rating)} <span>${p.rating} (${(p.user_ratings_total||0).toLocaleString()})</span></span>`:'';
    const typeTag=fmtTypes(p.types)?`<span class="tag">${fmtTypes(p.types)}</span>`:'';
    const openTag=p.opening_hours?.open_now!=null?`<span class="tag ${p.opening_hours.open_now?'open':'closed'}">${p.opening_hours.open_now?'Open now':'Closed'}</span>`:'';
    const mapUrl=p.place_id?`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(p.name+' '+p.formatted_address)}`:'#';
    card.innerHTML=`
      <div class="card-icon"><i class="ti ${getIcon(p.types)}"></i></div>
      <div class="card-body">
        <div class="card-name">${i+1}. ${p.name||'—'}</div>
        <div class="card-address">${p.formatted_address||p.vicinity||''}</div>
        <div class="card-meta">${rating}${typeTag}${openTag}</div>
      </div>
      <a class="map-link" href="${mapUrl}" target="_blank"><i class="ti ti-map-2"></i> Map</a>`;
    container.appendChild(card);
  });
}

async function doSearch(query){
  currentPlaces = [];
  const sec=document.getElementById('resultsSection');
  const container=document.getElementById('resultsContainer');
  document.getElementById('resultsLabel').textContent=query;
  document.getElementById('resultCount').textContent='';
  document.getElementById('mapInfoPanel').classList.remove('visible');
  sec.style.display='block';
  container.innerHTML='<div class="spinner"></div><div class="loading-text">Searching Japan…</div>';
  sec.scrollIntoView({behavior:'smooth',block:'start'});

  try{
    const resp=await fetch(`${BACKEND_URL}?query=${encodeURIComponent(query)}`);
    if(!resp.ok) throw new Error(`Server error: ${resp.status}`);
    const data=await resp.json();
    currentPlaces=data.results||[];
    document.getElementById('resultCount').textContent=currentPlaces.length ? `${currentPlaces.length} found` : '';
    renderList(currentPlaces);
    if(currentView==='map' && mapLoaded) renderMap();
  }catch(err){
    container.innerHTML=`<div class="error-box"><strong>Could not load results.</strong><br>The server may be waking up — please try again in 30 seconds.<br><br>Error: ${err.message}</div>`;
  }
}

document.querySelectorAll('.pill').forEach(pill=>{
  pill.addEventListener('click',()=>{
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    doSearch(pill.dataset.query);
  });
});
document.getElementById('searchBtn').addEventListener('click',()=>{
  const v=document.getElementById('searchInput').value.trim();
  if(v){document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));doSearch(v+' Japan');}
});
document.getElementById('searchInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const v=e.target.value.trim();if(v){document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));doSearch(v+' Japan');}}
});
</script>
</body>
</html>
