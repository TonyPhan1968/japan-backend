<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Japan 2026 Trip Finder</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#c0392b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Japan 2026"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1a1008;--crimson:#c0392b;--gold:#c9972c;--cream:#faf7f2;--paper:#f0ebe1;--muted:#7a6e61;--border:#d9d0c3;--card:#ffffff}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
.hero{padding:3.5rem 1.5rem 2rem;text-align:center}
.kamon{display:flex;justify-content:center;margin-bottom:1rem}
.kamon svg{opacity:0.18}
.tagline{font-family:'Shippori Mincho',serif;font-size:11px;letter-spacing:0.35em;text-transform:uppercase;color:var(--crimson);margin-bottom:0.5rem}
.hero-title{font-family:'Noto Serif JP',serif;font-size:clamp(22px,5vw,36px);font-weight:300;color:var(--ink);line-height:1.35;margin-bottom:0.3rem}
.hero-title em{font-style:normal;font-weight:700;color:var(--crimson)}
.year-badge{display:inline-block;font-size:11px;letter-spacing:0.2em;color:var(--muted);background:var(--paper);border:0.5px solid var(--border);border-radius:20px;padding:3px 14px;margin-bottom:1.5rem}
.search-wrap{position:relative;max-width:580px;margin:0 auto 1.25rem}
.search-input{width:100%;padding:14px 52px 14px 18px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--ink);background:var(--card);border:1.5px solid var(--border);border-radius:14px;outline:none;-webkit-appearance:none;transition:border-color 0.2s}
.search-input::placeholder{color:#b0a89b}
.search-input:focus{border-color:var(--crimson);box-shadow:0 0 0 3px rgba(192,57,43,0.08)}
.search-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:34px;height:34px;background:var(--crimson);border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.city-switcher{display:flex;justify-content:center;gap:8px;margin-bottom:1.25rem}
.city-btn{display:flex;align-items:center;gap:5px;padding:7px 18px;background:transparent;border:1.5px solid var(--border);border-radius:100px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.city-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
.pills{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:620px;margin:0 auto}
.pill{display:flex;align-items:center;gap:6px;padding:9px 15px;background:var(--card);border:1px solid var(--border);border-radius:100px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.pill:active,.pill.active{background:var(--crimson);border-color:var(--crimson);color:#fff}
.pill i{font-size:14px}

/* Results */
.divider{width:40px;height:1px;background:var(--border);margin:1.75rem auto 0}
.results-section{padding:0 1.25rem 4rem;max-width:740px;margin:0 auto}
.results-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 0 0.75rem}
.results-label{font-family:'Shippori Mincho',serif;font-size:13px;letter-spacing:0.15em;color:var(--muted);max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.results-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.result-count{font-size:12px;color:var(--muted);background:var(--paper);border:0.5px solid var(--border);padding:3px 10px;border-radius:20px}
.view-toggle{display:flex;background:var(--paper);border:0.5px solid var(--border);border-radius:20px;padding:3px;gap:2px}
.view-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border:none;background:transparent;border-radius:16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.view-btn.active{background:var(--crimson);color:#fff}
.view-btn i{font-size:13px}

/* Filter bar */
.filter-panel{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:1rem 1.1rem;margin-bottom:12px;animation:cardIn 0.25s ease}
.filter-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);font-family:'Shippori Mincho',serif;min-width:54px;padding-top:6px;flex-shrink:0}
.filter-opts{display:flex;gap:5px;flex-wrap:wrap}
.fopt{padding:5px 11px;background:var(--paper);border:0.5px solid var(--border);border-radius:100px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.fopt.active{background:var(--crimson);border-color:var(--crimson);color:#fff}
.fopt.toggle-on{background:#2d5a3d;border-color:#2d5a3d;color:#fff}
.location-hint{font-size:11px;color:var(--muted);font-style:italic;margin-top:4px;padding-left:64px}
.active-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.af-tag{display:flex;align-items:center;gap:3px;font-size:11px;background:var(--ink);color:#fff;padding:3px 9px;border-radius:20px}

/* Cards */
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--crimson);border-radius:50%;animation:spin 0.8s linear infinite;margin:3rem auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{text-align:center;font-family:'Shippori Mincho',serif;font-size:13px;letter-spacing:0.15em;color:var(--muted);margin-bottom:3rem}
.result-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:1rem 1.1rem;margin-bottom:10px;display:flex;gap:0.85rem;animation:cardIn 0.3s ease both;-webkit-tap-highlight-color:transparent;cursor:pointer;transition:border-color 0.2s}
.result-card:active{border-color:var(--crimson)}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-icon{width:42px;height:42px;background:var(--paper);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-icon i{font-size:20px;color:var(--crimson)}
.card-body{flex:1;min-width:0}
.card-name{font-weight:500;font-size:14px;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-address{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.stars{color:var(--gold);font-size:11px;font-weight:500}
.stars span{color:var(--muted);font-weight:400}
.tag{font-size:10px;background:var(--paper);border:0.5px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:20px}
.tag.open{background:#edf7ed;border-color:#b7dfb7;color:#2e7d32}
.tag.closed{background:#fdecea;border-color:#f5b8b4;color:#c0392b}
.card-arrow{margin-left:auto;color:var(--border);font-size:16px;flex-shrink:0;align-self:center}

/* Map */
#mapContainer{display:none;border-radius:14px;overflow:hidden;border:0.5px solid var(--border);margin-bottom:1rem}
#map{width:100%;height:420px}
.map-info-panel{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:1rem 1.1rem;margin-bottom:10px;display:none}
.map-info-panel.visible{display:block;animation:cardIn 0.2s ease}
.map-info-name{font-weight:500;font-size:15px;margin-bottom:3px}
.map-info-address{font-size:12px;color:var(--muted);margin-bottom:6px}
.map-info-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.map-info-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.map-action-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;border:0.5px solid var(--border);background:var(--paper);color:var(--ink)}
.map-action-btn.primary{background:var(--crimson);border-color:var(--crimson);color:#fff}

/* Detail sheet */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100}
.detail-overlay.visible{display:block}
.detail-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;max-height:88vh;overflow-y:auto;z-index:101;animation:slideUp 0.3s ease;padding-bottom:env(safe-area-inset-bottom)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.detail-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.detail-photos{position:relative;height:220px;overflow:hidden;background:var(--paper)}
.detail-photos img{width:100%;height:100%;object-fit:cover}
.detail-photos-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--border);font-size:48px}
.detail-body{padding:1.25rem}
.detail-name{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:400;margin-bottom:4px}
.detail-address{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.5}
.detail-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.detail-actions{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.detail-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:100px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;border:1px solid var(--border);background:var(--paper);color:var(--ink);-webkit-tap-highlight-color:transparent}
.detail-btn.primary{background:var(--crimson);border-color:var(--crimson);color:#fff}
.detail-btn i{font-size:15px}
.detail-section{margin-bottom:16px}
.detail-section-title{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);font-family:'Shippori Mincho',serif;margin-bottom:8px}
.hours-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:0.5px solid var(--paper)}
.hours-row:last-child{border-bottom:none}
.hours-day{color:var(--muted);font-weight:500;min-width:90px}
.hours-time{color:var(--ink);text-align:right}
.hours-row.today .hours-day,.hours-row.today .hours-time{color:var(--crimson);font-weight:600}
.close-btn{position:absolute;top:12px;right:12px;width:32px;height:32px;background:rgba(0,0,0,0.35);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
.close-btn i{color:#fff;font-size:16px}
.price-dots{color:var(--gold);font-size:13px}
.error-box{background:#fdecea;border:0.5px solid #f5b8b4;border-radius:10px;padding:1rem 1.25rem;font-size:13px;color:#922b21;line-height:1.8}
.no-results{text-align:center;padding:2.5rem 1rem}
.no-results i{font-size:36px;color:var(--border);display:block;margin-bottom:0.75rem}
.no-results p{font-family:'Shippori Mincho',serif;font-size:13px;color:var(--muted);letter-spacing:0.1em;line-height:1.8}
</style>
</head>
<body>

      <line x1="38.4" y1="38.4" x2="44.24" y2="44.24" stroke="#c0392b" stroke-width="1"/>

<script>
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(r=>r.unregister());});}

const BACKEND_URL = 'https://japan-backend-ry5q.onrender.com';
const MAPS_KEY    = 'AIzaSyBeTfb3Wdt53Id2fGf2Aas1UUqgyj0zZ5A';

const CITY_COORDS = {
  Tokyo: {lat:35.6762,lng:139.6503},
  Kyoto: {lat:35.0116,lng:135.7681},
  Osaka: {lat:34.6937,lng:135.5023}
};
const JAPAN_BOUNDS = {minLat:24,maxLat:46,minLng:122,maxLng:154};

let allPlaces=[], currentPlaces=[];
let currentCity='Tokyo', currentCat='', currentBaseQuery='';
let currentView='list';
let map=null, markers=[], mapLoaded=false;
let userLat=null, userLng=null, locationGranted=false;
let filterCuisine='', filterPrice='', filterRating='', filterDist='', filterOpen=false;

const ICONS={restaurant:'ti-tools-kitchen-2',food:'ti-tools-kitchen-2',ramen:'ti-bowl',bar:'ti-glass',cafe:'ti-coffee',coffee:'ti-coffee',music:'ti-music',karaoke:'ti-microphone',stadium:'ti-ball-baseball',sport:'ti-ball-baseball',arena:'ti-trophy',karting:'ti-steering-wheel',kart:'ti-steering-wheel',racing:'ti-steering-wheel',temple:'ti-building',shrine:'ti-building',museum:'ti-building-castle',park:'ti-trees',shopping:'ti-shopping-bag',store:'ti-shopping-bag',mall:'ti-shopping-bag',default:'ti-map-pin'};
const PRICE_LABELS=['','¥ Budget','¥¥ Moderate','¥¥¥ Expensive','¥¥¥¥ Luxury'];

function getIcon(types){if(!types||!types.length)return ICONS.default;for(const t of types){const k=t.toLowerCase();for(const key in ICONS){if(k.includes(key))return ICONS[key];}}return ICONS.default;}
function starsHtml(r){if(!r)return '';let s='';for(let i=0;i<Math.floor(r);i++)s+='★';if(r-Math.floor(r)>=0.5)s+='½';return s;}
function fmtTypes(t){if(!t||!t.length)return '';return t.slice(0,2).map(x=>x.replace(/_/g,' ')).join(' · ');}
function deg2rad(d){return d*(Math.PI/180);}
function distKm(a,b,c,d){const R=6371,dL=deg2rad(c-a),dl=deg2rad(d-b),x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(deg2rad(a))*Math.cos(deg2rad(c))*Math.sin(dl/2)*Math.sin(dl/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

function requestLocation(){
  if(!navigator.geolocation){document.getElementById('locationHint').textContent='GPS unavailable — using city centre';return;}
  document.getElementById('locationHint').textContent='Getting your location…';
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat,longitude:lng}=pos.coords;
    if(lat>=JAPAN_BOUNDS.minLat&&lat<=JAPAN_BOUNDS.maxLat&&lng>=JAPAN_BOUNDS.minLng&&lng<=JAPAN_BOUNDS.maxLng){
      userLat=lat;userLng=lng;locationGranted=true;
      document.getElementById('locationHint').textContent='📍 Using your current location';
    } else {
      document.getElementById('locationHint').textContent='Not in Japan — using '+currentCity+' centre';
    }
    if(allPlaces.length) refilter();
  },()=>{document.getElementById('locationHint').textContent='Could not get location — using city centre';if(allPlaces.length)refilter();});
}

function buildSearchQuery(){
  let q = currentBaseQuery;
  if(currentCat==='restaurants' && filterCuisine) q = filterCuisine+' '+q;
  return q+' '+currentCity+' Japan';
}

function applyFilters(places){
  let f=[...places];
  if(filterDist){
    const r=parseInt(filterDist);
    const refLat=locationGranted?userLat:CITY_COORDS[currentCity].lat;
    const refLng=locationGranted?userLng:CITY_COORDS[currentCity].lng;
    f=f.filter(p=>{const la=p.geometry?.location?.lat,ln=p.geometry?.location?.lng;if(!la||!ln)return true;return distKm(refLat,refLng,la,ln)*1000<=r;});
  }
  if(filterPrice) f=f.filter(p=>p.price_level==null||p.price_level==parseInt(filterPrice));
  if(filterRating) f=f.filter(p=>!p.rating||p.rating>=parseFloat(filterRating));
  if(filterOpen) f=f.filter(p=>p.opening_hours?.open_now===true);
  return f;
}

function showActiveFilters(){
  const tags=[];
  if(filterCuisine) tags.push(`<span class="af-tag">🍜 ${filterCuisine}</span>`);
  if(filterPrice) tags.push(`<span class="af-tag">💴 ${PRICE_LABELS[filterPrice]}</span>`);
  if(filterRating) tags.push(`<span class="af-tag">⭐ ${filterRating}+</span>`);
  if(filterDist) tags.push(`<span class="af-tag">📍 ${parseInt(filterDist)/1000}km</span>`);
  if(filterOpen) tags.push(`<span class="af-tag">🕐 Open now</span>`);
  document.getElementById('activeFiltersBar').innerHTML=tags.length?`<div class="active-filters">${tags.join('')}</div>`:'';
}

function refilter(){
  // Cuisine changes the actual query — re-search
  if(currentCat==='restaurants' && filterCuisine!==undefined){
    // handled separately in cuisine click
  }
  currentPlaces=applyFilters(allPlaces);
  document.getElementById('resultCount').textContent=currentPlaces.length?`${currentPlaces.length} found`:'';
  showActiveFilters();
  renderList(currentPlaces);
  if(currentView==='map'&&mapLoaded) renderMap();
}

// Show/hide restaurant-only filters
function updateFilterVisibility(){
  const isRestaurant = currentCat==='restaurants';
  document.getElementById('cuisineRow').style.display = isRestaurant?'block':'none';
  document.getElementById('priceRow').style.display   = isRestaurant?'block':'none';
}

// Filter events
document.getElementById('cuisineOpts').querySelectorAll('.fopt').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.getElementById('cuisineOpts').querySelectorAll('.fopt').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filterCuisine=btn.dataset.cuisine;
    // Cuisine re-triggers actual search
    doSearch(buildSearchQuery(), false);
  });
});
document.getElementById('priceOpts').querySelectorAll('.fopt').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.getElementById('priceOpts').querySelectorAll('.fopt').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); filterPrice=btn.dataset.price; refilter();
  });
});
document.getElementById('ratingOpts').querySelectorAll('.fopt').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.getElementById('ratingOpts').querySelectorAll('.fopt').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); filterRating=btn.dataset.rating; refilter();
  });
});
document.getElementById('distOpts').querySelectorAll('.fopt').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.getElementById('distOpts').querySelectorAll('.fopt').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); filterDist=btn.dataset.dist;
    if(filterDist && !locationGranted) requestLocation();
    else if(allPlaces.length) refilter();
  });
});
document.getElementById('openNowBtn').addEventListener('click',function(){
  filterOpen=!filterOpen; this.classList.toggle('toggle-on',filterOpen); refilter();
});

// Detail panel
async function openDetail(place){
  const sheet=document.getElementById('detailSheet'),overlay=document.getElementById('detailOverlay'),content=document.getElementById('detailContent');
  sheet.style.display='block'; overlay.classList.add('visible');
  content.innerHTML=`<div style="text-align:center;padding:3rem"><div class="spinner" style="margin:0 auto 1rem"></div><div style="font-family:Shippori Mincho,serif;font-size:13px;color:#7a6e61">Loading details…</div></div>`;
  try{
    const resp=await fetch(`${BACKEND_URL}/details?place_id=${place.place_id}`);
    if(!resp.ok) throw new Error('Failed');
    const d=await resp.json();
    const todayIdx=new Date().getDay();
    const photoHtml=d.photos?.length?`<img src="${d.photos[0].url}" alt="${d.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=detail-photos-placeholder><i class=ti.ti-photo-off></i></div>'">`:`<div class="detail-photos-placeholder"><i class="ti ti-photo-off"></i></div>`;
    const ratingHtml=d.rating?`<span class="stars">${starsHtml(d.rating)} <span>${d.rating} (${(d.user_ratings_total||0).toLocaleString()})</span></span>`:'';
    const typeHtml=fmtTypes(d.types)?`<span class="tag">${fmtTypes(d.types)}</span>`:'';
    const openHtml=d.opening_hours?.open_now!=null?`<span class="tag ${d.opening_hours.open_now?'open':'closed'}">${d.opening_hours.open_now?'Open now':'Closed'}</span>`:'';
    const priceHtml=d.price_level?`<span class="price-dots">${['','¥','¥¥','¥¥¥','¥¥¥¥'][d.price_level]}</span>`:'';
    const directionsUrl=`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(d.name+' '+d.formatted_address)}`;
    const websiteBtn=d.website?`<a class="detail-btn" href="${d.website}" target="_blank"><i class="ti ti-world"></i> Website</a>`:'';
    const phoneBtn=d.phone?`<a class="detail-btn" href="tel:${d.phone}"><i class="ti ti-phone"></i> ${d.phone}</a>`:'';
    let hoursHtml='';
    if(d.opening_hours?.weekday_text?.length){
      hoursHtml=`<div class="detail-section"><div class="detail-section-title">Opening Hours</div>${d.opening_hours.weekday_text.map((line,i)=>{const dn=line.split(':')[0];const tm=line.substring(dn.length+1).trim();const it=((i+1)%7)===todayIdx;return`<div class="hours-row ${it?'today':''}"><span class="hours-day">${dn}</span><span class="hours-time">${tm}</span></div>`;}).join('')}</div>`;
    }
    content.innerHTML=`<div style="position:relative"><div class="detail-photos">${photoHtml}</div><button class="close-btn" onclick="closeDetail()"><i class="ti ti-x"></i></button></div><div class="detail-body"><div class="detail-name">${d.name}</div><div class="detail-address">${d.formatted_address}</div><div class="detail-meta">${ratingHtml}${typeHtml}${openHtml}${priceHtml}</div><div class="detail-actions"><a class="detail-btn primary" href="${directionsUrl}" target="_blank"><i class="ti ti-directions"></i> Directions</a>${websiteBtn}${phoneBtn}</div>${hoursHtml}</div>`;
  }catch(err){content.innerHTML=`<div style="padding:1.5rem"><div class="error-box">Could not load details.<br><small>${err.message}</small></div></div>`;}
}
function closeDetail(){document.getElementById('detailSheet').style.display='none';document.getElementById('detailOverlay').classList.remove('visible');}

// Map
function switchView(view){
  currentView=view;
  document.getElementById('listViewBtn').classList.toggle('active',view==='list');
  document.getElementById('mapViewBtn').classList.toggle('active',view==='map');
  document.getElementById('listView').style.display=view==='list'?'block':'none';
  document.getElementById('mapView').style.display=view==='map'?'block':'none';
  if(view==='map'){document.getElementById('mapContainer').style.display='block';if(!mapLoaded)loadGoogleMaps();else renderMap();}
}
function loadGoogleMaps(){if(mapLoaded)return;const s=document.createElement('script');s.src=`https://maps.googleapis.com/maps/api/js?key=${MAPS_KEY}&callback=initMap`;s.async=true;document.head.appendChild(s);}
window.initMap=function(){mapLoaded=true;const c=CITY_COORDS[currentCity];map=new google.maps.Map(document.getElementById('map'),{center:c,zoom:12,mapTypeControl:false,streetViewControl:false,fullscreenControl:false,styles:[{featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]}]});renderMap();};
function renderMap(){if(!map||!currentPlaces.length)return;markers.forEach(m=>m.setMap(null));markers=[];const bounds=new google.maps.LatLngBounds();currentPlaces.forEach((place,i)=>{const lat=place.geometry?.location?.lat,lng=place.geometry?.location?.lng;if(!lat||!lng)return;const marker=new google.maps.Marker({position:{lat,lng},map,title:place.name,label:{text:String(i+1),color:'#ffffff',fontSize:'12px',fontWeight:'500'},icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:'#c0392b',fillOpacity:1,strokeColor:'#ffffff',strokeWeight:2,scale:16}});marker.addListener('click',()=>showMapInfo(place,i));markers.push(marker);bounds.extend({lat,lng});});if(markers.length>0)map.fitBounds(bounds);}
function showMapInfo(place,index){const panel=document.getElementById('mapInfoPanel');const rating=place.rating?`<span class="stars">${starsHtml(place.rating)} <span>${place.rating}</span></span>`:'';const typeTag=fmtTypes(place.types)?`<span class="tag">${fmtTypes(place.types)}</span>`:'';const openTag=place.opening_hours?.open_now!=null?`<span class="tag ${place.opening_hours.open_now?'open':'closed'}">${place.opening_hours.open_now?'Open now':'Closed'}</span>`:'';const directionsUrl=`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(place.name+' '+place.formatted_address)}`;panel.innerHTML=`<div class="map-info-name">${index+1}. ${place.name}</div><div class="map-info-address">${place.formatted_address||''}</div><div class="map-info-meta">${rating}${typeTag}${openTag}</div><div class="map-info-actions"><a class="map-action-btn primary" href="${directionsUrl}" target="_blank"><i class="ti ti-directions"></i> Directions</a><button class="map-action-btn" onclick="openDetail(currentPlaces[${index}])"><i class="ti ti-info-circle"></i> Details</button><button class="map-action-btn" onclick="document.getElementById('mapInfoPanel').classList.remove('visible')"><i class="ti ti-x"></i></button></div>`;panel.classList.add('visible');const lat=place.geometry?.location?.lat,lng=place.geometry?.location?.lng;if(lat&&lng)map.panTo({lat,lng});}

function renderList(places){
  const container=document.getElementById('resultsContainer');
  container.innerHTML='';
  if(!places.length){container.innerHTML=`<div class="no-results"><i class="ti ti-mood-empty"></i><p>No results match your filters<br>Try adjusting the filters above</p></div>`;return;}
  places.forEach((p,i)=>{
    const card=document.createElement('div');card.className='result-card';card.style.animationDelay=`${i*40}ms`;
    const rating=p.rating?`<span class="stars">${starsHtml(p.rating)} <span>${p.rating} (${(p.user_ratings_total||0).toLocaleString()})</span></span>`:'';
    const typeTag=fmtTypes(p.types)?`<span class="tag">${fmtTypes(p.types)}</span>`:'';
    const openTag=p.opening_hours?.open_now!=null?`<span class="tag ${p.opening_hours.open_now?'open':'closed'}">${p.opening_hours.open_now?'Open now':'Closed'}</span>`:'';
    const priceTag=p.price_level?`<span class="tag">${['','¥','¥¥','¥¥¥','¥¥¥¥'][p.price_level]}</span>`:'';
    card.innerHTML=`<div class="card-icon"><i class="ti ${getIcon(p.types)}"></i></div><div class="card-body"><div class="card-name">${i+1}. ${p.name||'—'}</div><div class="card-address">${p.formatted_address||p.vicinity||''}</div><div class="card-meta">${rating}${typeTag}${openTag}${priceTag}</div></div><i class="ti ti-chevron-right card-arrow"></i>`;
    card.addEventListener('click',()=>openDetail(p));
    container.appendChild(card);
  });
}

async function doSearch(query, resetFilters=true){
  if(resetFilters){
    filterCuisine=''; filterPrice=''; filterRating=''; filterDist=''; filterOpen=false;
    document.querySelectorAll('.fopt').forEach(b=>{b.classList.remove('active','toggle-on');if(b.dataset.cuisine===''||b.dataset.price===''||b.dataset.rating===''||b.dataset.dist==='')b.classList.add('active');});
    document.getElementById('openNowBtn').classList.remove('toggle-on');
    document.getElementById('locationHint').textContent='';
  }
  allPlaces=[];currentPlaces=[];
  const sec=document.getElementById('resultsSection');
  const container=document.getElementById('resultsContainer');
  document.getElementById('resultsLabel').textContent=query;
  document.getElementById('resultCount').textContent='';
  document.getElementById('mapInfoPanel').classList.remove('visible');
  document.getElementById('activeFiltersBar').innerHTML='';
  sec.style.display='block';
  container.innerHTML='<div class="spinner"></div><div class="loading-text">Searching '+currentCity+'…</div>';
  sec.scrollIntoView({behavior:'smooth',block:'start'});
  try{
    const resp=await fetch(`${BACKEND_URL}/search?query=${encodeURIComponent(query)}`);
    if(!resp.ok) throw new Error(`Server error: ${resp.status}`);
    const data=await resp.json();
    allPlaces=data.results||[];
    currentPlaces=applyFilters(allPlaces);
    document.getElementById('resultCount').textContent=currentPlaces.length?`${currentPlaces.length} found`:'';
    showActiveFilters();
    renderList(currentPlaces);
    if(currentView==='map'&&mapLoaded) renderMap();
  }catch(err){
    container.innerHTML=`<div class="error-box"><strong>Could not load results.</strong> Server may be waking up — try again in 30 seconds.<br><small>${err.message}</small></div>`;
  }
}

// City switcher
document.querySelectorAll('.city-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.city-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); currentCity=btn.dataset.city; locationGranted=false;
    document.getElementById('locationHint').textContent='';
    const activeP=document.querySelector('.pill.active');
    if(activeP) doSearch(buildSearchQuery());
  });
});

// Category pills
document.querySelectorAll('.pill').forEach(pill=>{
  pill.addEventListener('click',()=>{
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    currentCat=pill.dataset.cat;
    currentBaseQuery=pill.dataset.query;
    filterCuisine='';
    updateFilterVisibility();
    doSearch(buildSearchQuery());
  });
});

// Search box
document.getElementById('searchBtn').addEventListener('click',()=>{
  const v=document.getElementById('searchInput').value.trim();
  if(v){document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));currentCat='';currentBaseQuery=v;updateFilterVisibility();doSearch(v+' '+currentCity+' Japan');}
});
document.getElementById('searchInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const v=e.target.value.trim();if(v){document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));currentCat='';currentBaseQuery=v;updateFilterVisibility();doSearch(v+' '+currentCity+' Japan');}}
});
</script>
